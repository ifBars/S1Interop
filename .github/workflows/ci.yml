name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build and portable tests
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore S1Interop.sln

      - name: Build
        run: dotnet build S1Interop.sln --no-restore --configuration Release

      - name: Portable tests
        run: dotnet run --project tests\S1Interop.Tests\S1Interop.Tests.csproj --configuration Release --no-build -- --portable

      - name: Pack CLI tool
        run: dotnet pack src\S1Interop.Cli\S1Interop.Cli.csproj --no-build --configuration Release --output artifacts\packages

      - name: Install CLI tool from package
        run: dotnet tool install S1Interop --tool-path .\.tools --add-source artifacts\packages --version 0.1.0-alpha.1

      - name: Smoke CLI tool command
        run: .\.tools\s1interop --help
